name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  APP_NAME: volt
  GO_VERSION: "1.23.3"
  NODE_VERSION: "20"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-24.04
            platform: linux/amd64
            build_args: -tags webkit2_41
            asset_name: volt-linux-amd64.tar.gz
          - label: Windows
            os: windows-latest
            platform: windows/amd64
            build_args: ""
            asset_name: volt-windows-amd64.zip
          - label: macOS
            os: macos-15
            platform: darwin/universal
            build_args: ""
            asset_name: volt-macos-universal.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          if [ -n "${{ matrix.build_args }}" ]; then
            wails build -platform "${{ matrix.platform }}" ${{ matrix.build_args }}
          else
            wails build -platform "${{ matrix.platform }}"
          fi

      - name: Archive Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf "${{ matrix.asset_name }}" -C build/bin .

      - name: Archive Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/* -DestinationPath "${{ matrix.asset_name }}"

      - name: Archive macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-release
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release"
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "github.ref=$GITHUB_REF"
          echo "github.sha=$GITHUB_SHA"
          echo "TAG_NAME=$TAG_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" --target "$GITHUB_SHA" --generate-notes
          fi

          gh release upload "$TAG_NAME" release-assets/* --clobber
